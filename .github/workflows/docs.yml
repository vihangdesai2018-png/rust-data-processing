# Build Rust (rustdoc) + Python (pdoc) documentation.
# On push to main: deploy the combined site to GitHub Pages.
# On pull requests: verify both doc builds without deploying.
#
# Prerequisite (one-time per repo): Settings → Pages → Build and deployment → Source: **GitHub Actions**.
# Until then, the deploy job fails (Pages API has no site). We omit actions/configure-pages so the
# deploy path matches artifact-only static hosting (configure-pages is mainly for SSG metadata and
# duplicated the same GET /pages failure).

name: Documentation

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

# Opt JavaScript actions into Node 24 (avoids Node 20 deprecation warnings on the runner).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "true"

      - name: cargo doc (rustdoc)
        run: cargo doc --no-deps --locked

      - name: setup uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python API docs (pdoc)
        working-directory: python-wrapper
        run: |
          set -euo pipefail
          uv sync --group dev
          uv run maturin develop --release
          uv run pdoc -d google -o "${GITHUB_WORKSPACE}/site/python" rust_data_processing

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site/rust
          cp -a target/doc/. site/rust/
          cp -f docs/landing/index.html site/index.html

      # Only needed for the deploy job (skip on PRs to avoid unused Pages artifacts).
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
